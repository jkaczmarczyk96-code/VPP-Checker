name: Send Feedback

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dawidd6/action-send-mail@v4
        with:
          server_address: smtp.gmail.com
          server_port: 465
          username: ${{ secrets.EMAIL }}
          password: ${{ secrets.EMAIL_PASSWORD }}
          subject: VPP Checker – Feedback report
          to: j.kaczmarczyk@seznam.cz
          from: VPP Checker
          secure: true
          attachments: feedback.csv
